name: Wiki Catalog

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "src/Wiki/**"
      - "src/Core/**"
      - "src/Assets/**"
      - ".github/workflows/wiki-catalog.yml"

permissions:
  contents: write

# Serialize wiki pushes so concurrent runs cannot clobber each other.
concurrency:
  group: wiki-catalog
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  generate-wiki:
    name: Generate and sync catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Generate catalog content
        run: |
          set -euo pipefail
          mkdir -p wiki_content
          dotnet run --project src/Wiki -c Release -- wiki_content

      - name: Sync to wiki repository
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki

          rm -rf wiki/Catalog
          cp -r wiki_content/Catalog wiki/

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No catalog changes to publish."
          else
            git commit -m "docs(catalog): auto-update catalog reference"
            git push
          fi
